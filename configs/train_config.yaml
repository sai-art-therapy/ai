# YOLOv8 Fine-tuning 학습 설정

# ── 모델 ──────────────────────────────────────────────
model: yolov8n.pt          # 사전학습 가중치: yolov8n/s/m/l/x.pt 중 선택
task: detect               # detect | segment | classify | pose

# ── 데이터 ────────────────────────────────────────────
data: ./data/dataset.yaml  # 데이터셋 config 경로
imgsz: 640                 # 입력 이미지 크기

# ── 학습 기본 설정 ────────────────────────────────────
epochs: 100
batch: 16                  # GPU 메모리에 따라 조절 (OOM 시 줄이기)
workers: 8
device: 0                  # GPU id (CPU 사용 시 'cpu')

# ── 옵티마이저 ────────────────────────────────────────
optimizer: AdamW           # SGD | Adam | AdamW | RMSProp
lr0: 0.001                 # 초기 학습률
lrf: 0.01                  # 최종 학습률 (lr0 * lrf)
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# ── 손실 가중치 ───────────────────────────────────────
box: 7.5
cls: 0.5
dfl: 1.5

# ── 데이터 증강 ───────────────────────────────────────
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.0
copy_paste: 0.0

# ── 저장 / 로깅 ───────────────────────────────────────
project: ./runs/train      # 결과 저장 루트
name: exp                  # 실험 이름 (runs/train/exp)
save: true
save_period: -1            # N 에폭마다 체크포인트 저장 (-1 = 마지막만)
cache: false               # 이미지 캐시 (RAM 충분 시 true)
exist_ok: false
pretrained: true           # 사전학습 가중치 사용 여부
resume: false              # 중단된 학습 재개 여부
plots: true                # 학습 곡선 / 예측 결과 저장
verbose: true
seed: 0

# ── 조기 종료 ─────────────────────────────────────────
patience: 50               # mAP 개선 없을 때 종료 대기 에폭
